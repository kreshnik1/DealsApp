version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: dealsapp_backend
    command: ["sh", "/app/entrypoint.sh"]
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://dealsapp:dealsapp@postgres:5432/dealsapp
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:15
    container_name: dealsapp_postgres
    environment:
      POSTGRES_USER: dealsapp
      POSTGRES_PASSWORD: dealsapp
      POSTGRES_DB: dealsapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dealsapp_redis
    ports:
      - "6380:6379"

volumes:
  postgres_data:
